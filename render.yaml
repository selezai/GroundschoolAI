services:
  - type: web
    name: groundschool-ai
    env: node
    region: oregon
    rootDir: .
    buildCommand: |
      # Install dependencies and build client
      npm install
      npm install -g expo-cli
      npx expo export:web
      
      # Debug client build
      echo "Current directory contents:"
      ls -la
      
      # Create dist directory and move web build
      mkdir -p dist
      mv web-build dist/
      
      # Debug dist directory
      echo "Dist directory contents:"
      ls -la dist/
      
      # Build server
      cd server
      npm install
      npm run build
      cd ..
      
      # Final debug
      echo "Final directory structure:"
      ls -la
      ls -la dist/
      ls -la dist/web-build/
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
