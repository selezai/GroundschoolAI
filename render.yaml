services:
  - type: web
    name: groundschool-ai
    env: node
    region: oregon
    rootDir: .
    buildCommand: |
      echo "Starting build process..." && \
      cd /opt/render/project/src && \
      echo "Installing root dependencies..." && \
      npm install && \
      echo "Installing expo-cli..." && \
      npm install -g expo-cli && \
      echo "Building web client..." && \
      npx expo export:web && \
      echo "Web-build directory after expo export:" && \
      ls -la web-build/ && \
      cd server && \
      echo "Installing server dependencies..." && \
      npm install && \
      echo "Building server..." && \
      npm run build && \
      echo "Server dist directory after build:" && \
      ls -la dist/ && \
      cd .. && \
      echo "Moving web-build to server/dist/..." && \
      mkdir -p server/dist/web-build && \
      cp -r web-build/* server/dist/web-build/ && \
      echo "Final server/dist/web-build contents:" && \
      ls -la server/dist/web-build/
    startCommand: |
      cd /opt/render/project/src/server && \
      echo "Starting server from directory:" && \
      pwd && \
      echo "Server dist directory contents:" && \
      ls -la dist/ && \
      echo "Web build directory contents:" && \
      ls -la dist/web-build/ && \
      npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
