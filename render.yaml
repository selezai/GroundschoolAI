services:
  - type: web
    name: groundschool-ai
    env: node
    region: oregon
    rootDir: .
    buildCommand: |
      cd /opt/render/project/src && \
      npm install && \
      npm install -g expo-cli && \
      npx expo export:web && \
      cd server && \
      npm install && \
      npm run build && \
      cd .. && \
      echo "Project root contents before move:" && \
      ls -la && \
      echo "Moving web-build to server/dist/" && \
      mv web-build server/dist/ && \
      echo "Server dist contents after move:" && \
      ls -la server/dist/
    startCommand: cd /opt/render/project/src/server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
