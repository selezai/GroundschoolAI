services:
  - type: web
    name: groundschool-ai
    env: node
    region: oregon
    buildCommand: |
      # Install root dependencies first
      npm install
      
      # Install expo-cli globally
      npm install -g expo-cli
      
      # Build web client
      npx expo export:web
      
      # Move web build to the correct location
      mkdir -p dist
      mv web-build dist/
      
      # Build server
      cd server
      npm install
      npm run build
      cd ..
      
      # List directories for debugging
      echo "Contents of current directory:"
      ls -la
      echo "Contents of dist directory:"
      ls -la dist/
      echo "Contents of dist/web-build directory:"
      ls -la dist/web-build/
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
