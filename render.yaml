services:
  - type: web
    name: groundschool-ai
    env: node
    region: oregon
    rootDir: .
    buildCommand: npm install && npm install -g expo-cli && npx expo export:web && cd server && npm install && npm run build && cd .. && mkdir -p server/dist/web-build && cp -r web-build/* server/dist/web-build/
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
